<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" </head>

<body>
    <div id="cal">
        <div class="input"></div>
        
        <div class="row">
            <button class="but-yellow">
                <b>+</b>
            </button>
            <button class="but-yellow">
                <b>-</b>
            </button>
            <button class="but-yellow">
                <b>*</b>
            </button>
            <button class="but-yellow">
                <b>/</b>
            </button>
        </div>

        <div class="row">
            <button class="but-blue">
                <b>9</b>
            </button>
            <button class="but-blue">
                <b>8</b>
            </button>
            <button class="but-blue">
                <b>7</b>
            </button>
            <button class="but-blue">
                <b>6</b>
            </button>
        </div>

        <div class="row">
            <button class="but-blue">
                <b>5</b>
            </button>
            <button class="but-blue">
                <b>4</b>
            </button>
            <button class="but-blue">
                <b>3</b>
            </button>
            <button class="but-blue">
                <b>2</b>
            </button>
        </div>

        <div class="row">
            <button class="but-blue">
                <b>1</b>
            </button>
            <button class="but-blue">
                <b>0</b>
            </button>
            <button class="but-blue">
                <b>.</b>
            </button>
            <button class="but-red">
                <b>C</b>
            </button>
        </div>
        <div class="row">
            <button class="but-equal">
                <b>=</b>
            </button>
            <button class="but-equal" style="visibility: hidden;">
                <b>=</b>
            </button>
        </div>
    </div>
</body>


</html>
